<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CTL ORION | Verificação</title>

    <link rel="stylesheet" href="css/login.css">
</head>

<body>

    <main>

        <div class="login-container">

            <h1>ORION</h1>

            <p class="subtitle">
                CTL ORION
            </p>

            <h2>Verificação de Segurança</h2>

            <p>
                Enviamos um código de 6 dígitos para o seu e-mail.
            </p>

            <form id="verificationForm">

                <div class="input-group">

                    <label for="code">
                        Código de segurança
                    </label>

                    <div class="input-box">

                        <input
                            type="text"
                            id="code"
                            maxlength="6"
                            inputmode="numeric"
                            autocomplete="one-time-code"
                            placeholder="000000"
                            required
                        >

                    </div>

                </div>

                <button type="submit">
                    Confirmar acesso
                </button>

            </form>

        </div>

    </main>

    <script src="js/verificar.js"></script>

</body>

</html>
